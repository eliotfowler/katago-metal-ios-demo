# Minimal KataGo config for iOS demo

# Search
numSearchThreads = 2
numAnalysisThreads = 1

# Neural net
nnMaxBatchSize = 1
nnCacheSizePowerOfTwo = 16
nnMutexPoolSizePowerOfTwo = 12

# Metal backend threads
numNNServerThreadsPerModel = 1

# Rules (default TT-ish)
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideAllowed = false
hasButton = false

# Misc
logAllRequests = false
logAllResponses = false
logSearchInfo = false

# Analysis
analysisPVLen = 15
